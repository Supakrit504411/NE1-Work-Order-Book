<script>
/* ============================================================
 * javascript.html — JS Logic หน้าบ้านทั้งหมดของ Work Book
 * ------------------------------------------------------------
 * โครงสร้าง:
 *   - Config / Globals
 *   - API helper (callApi)
 *   - Auth (login / logout / recordLogin)
 *   - User stats
 *   - Config loader & UI binding
 *   - Navigation (sections)
 *   - Form (create / update)
 *   - Data display (all / search)
 *   - Summary (chart + table)
 *   - Export (CSV)
 *   - Modals (view / edit / image / link)
 *   - Init
 * ============================================================ */

/* ====================== CONFIG / GLOBALS ====================== */
// SCRIPT_URL: ใส่ Web App URL ของคุณตรงนี้ (Deploy > Web app URL)
// ปล่อยว่าง '' ไว้ก่อนก็ได้ ระบบจะพยายาม auto-detect (ใช้ได้เฉพาะตอนรันใน GAS)
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbySWDtLdWBpl7FDRSAxwkOCzyPtUjru29dRuwtyfp_Q2uCrbcGRCab3QVcElv6MDdKH/exec';

let allData = [];
let configData = {};
let isLoggedIn = false;

// Pagination
let currentPage = 1;
let searchCurrentPage = 1;
const ITEMS_PER_PAGE = 20;

// Search state
let searchResultsData = [];

// Sort state
let sortDirection = {};
let searchSortDirection = {};

// Chart instance
let summaryChartInstance = null;


/* ====================== API HELPER ====================== */
/**
 * เรียก GAS API �่าน google.script.run (Server-side call)
 * ใช้ได้เฉพาะเมื่อรันผ่าน Google Apps Script Web App ที่ Deploy แล้ว
 * @param {string} action
 * @param {Object} params (POST body)
 * @param {string} method 'GET' | 'POST'
 * @returns {Promise<any>} response object
 */
async function callServer(action, params, method) {
    method = method || 'GET';
    params = params || {};
    try {
        var url = SCRIPT_URL;
        var bodyData = JSON.stringify({ action: action, params: params });
        var fetchOptions;
        if (method === 'POST') {
            fetchOptions = {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
                body: bodyData
            };
        } else {
            url = SCRIPT_URL + '?action=' + encodeURIComponent(action) + '&t=' + Date.now();
            fetchOptions = { method: 'GET' };
        }
        var resp = await fetch(url, fetchOptions);
        return await resp.json();
    } catch (err1) {
        console.warn('fetch failed, trying google.script.run:', err1);
        try {
            return await new Promise(function(resolve, reject) {
                var ok = function(r) { resolve(r); };
                var fail = function(e) { reject(e); };
                if (method === 'POST') {
                    google.script.run.withSuccessHandler(ok).withFailureHandler(fail)
                        .doPost({ action: action, params: params });
                } else {
                    google.script.run.withSuccessHandler(ok).withFailureHandler(fail)
                        .doGet({ action: action });
                }
            });
        } catch (err2) {
            console.error('callServer[' + action + '] ERROR:', err2);
            return { success: false, error: err2.message || 'Connection failed' };
        }
    }
}

var callApi = callServer;


/* ====================== INIT ====================== */
document.addEventListener('DOMContentLoaded', function () {
    // Event listeners
    document.getElementById('loginForm').addEventListener('submit', handleLoginSubmit);
    document.getElementById('recordForm').addEventListener('submit', handleRecordSubmit);
    document.getElementById('editForm').addEventListener('submit', handleEditSubmit);

    // Escape key ปิด modal
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
            closeEditModal(); closeViewModal(); closeImageModal(); closeLinkModal();
        }
    });

    // เริ่มต้น UI — แสดง login modal + blur พื้นหลัง
    initUI();

    // โหลดข้อมูลเริ่มต้น
    loadConfig();
    populateYearOptions();
    loadUserStats();
    setInterval(loadUserStats, 30000); // อัปเดตทุก 30 วินาที
});

/**
 * เริ่มต้นสถานะ UI — login modal แสดง + ทุกอย่างเบลอ
 * ต้องรันเพื่อแยกหน้า login ออกจากหน้าใช้งาน
 */
function initUI() {
    // ซ่อนทุก section เริ่มต้น
    document.querySelectorAll('.wb-section').forEach(function(s) {
        s.classList.add('d-none');
    });
    // แสดง recordSection เป็น default
    var recordSection = document.getElementById('recordSection');
    if (recordSection) recordSection.classList.remove('d-none');

    // ซ่อน app container จนกว่าจะ login สำเร็จ
    var appContainer = document.getElementById('appContainer');
    if (appContainer) appContainer.classList.add('d-none');
}


/* ====================== AUTH ====================== */
async function handleLoginSubmit(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) return;

    showLoginSpinner(true);

    try {
        const result = await callApi('login', { username: username, password: password }, 'POST');

        if (result.success) {
            isLoggedIn = true;
            // แสดง app container และซ่อน login modal
            var appContainer = document.getElementById('appContainer');
            if (appContainer) appContainer.classList.remove('d-none');
            document.getElementById('loginModal').classList.add('d-none');
            recordUserLogin(username);
            loadUserStats();
            Swal.fire({
                icon: 'success', title: 'เข้าสู่ระบบสำเร็จ',
                text: 'ยินดีต้อนรับเข้าสู่ระบบ',
                timer: 1800, showConfirmButton: false
            });
        } else {
            Swal.fire({
                icon: 'error', title: 'เข้าสู่ระบบไม่สำเร็จ',
                text: 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'
            });
        }
    } catch (error) {
        console.error('Login error:', error);
        Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้' });
    }
    showLoginSpinner(false);
}

function showLoginSpinner(show) {
    const txt = document.getElementById('loginBtnText');
    const sp = document.getElementById('loginSpinner');
    if (show) { txt.classList.add('d-none'); sp.classList.remove('d-none'); }
    else { txt.classList.remove('d-none'); sp.classList.add('d-none'); }
}

function logout() {
    isLoggedIn = false;
    // ซ่อน app container และแสดง login modal
    var appContainer = document.getElementById('appContainer');
    if (appContainer) appContainer.classList.add('d-none');
    document.getElementById('loginModal').classList.remove('d-none');
    document.getElementById('loginForm').reset();
}

function removeBlur() {
    // No longer needed - app container handles visibility
}
function addBlur() {
    // No longer needed - app container handles visibility
}

async function recordUserLogin(username) {
    try {
        await callApi('recordLogin', {
            username: username,
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent
        }, 'POST');
    } catch (e) {
        console.warn('recordUserLogin failed:', e);
    }
}


/* ====================== USER STATS ====================== */
async function loadUserStats() {
    try {
        const result = await callApi('getUserStats');
        const stats = (result && result.data) || { onlineUsers: 1, todayUsers: 1, totalUsers: 1 };
        document.getElementById('onlineUsers').textContent = stats.onlineUsers || 1;
        document.getElementById('todayUsers').textContent = stats.todayUsers || 1;
        document.getElementById('totalUsers').textContent = stats.totalUsers || 1;
    } catch (e) {
        console.warn('loadUserStats failed:', e);
    }
}


/* ====================== CONFIG LOADER ====================== */
async function loadConfig() {
    try {
        const result = await callApi('getConfig');
        if (result && result.success) {
            configData = result.data;
            updateUIWithConfig();
            populateDropdowns();
            loadExternalLinks();
        }
    } catch (e) {
        console.error('loadConfig failed:', e);
    }
}

function updateUIWithConfig() {
    if (configData.appTitle) {
        document.getElementById('appTitle').textContent = configData.appTitle;
        var loginTitle = document.getElementById('loginAppTitle');
        if (loginTitle) loginTitle.textContent = configData.appTitle;
    }
    if (configData.bannerImage) {
        const banner = document.getElementById('headerBanner');
        banner.style.backgroundImage = 'url("' + configData.bannerImage + '")';
    }
    if (configData.developerInfo) document.getElementById('developerInfo').textContent = configData.developerInfo;
}

function populateDropdowns() {
    setSelectOptions('district', configData.districts);
    setSelectOptions('responsible', configData.responsiblePersons);
    setSelectOptions('searchResponsible', configData.responsiblePersons);
    setSelectOptions('budget', configData.budgetTypes);
    setSelectOptions('status', configData.statusOptions);
    setSelectOptions('searchStatus', configData.statusOptions);
}

function setSelectOptions(id, items) {
    const sel = document.getElementById(id);
    if (!sel) return;
    // เก็บ option แรก (placeholder) ไว้
    while (sel.options.length > 1) sel.remove(1);
    if (items && items.length) {
        items.forEach(v => sel.add(new Option(v, v)));
    }
}

function populateYearOptions() {
    const sel = document.getElementById('summaryYear');
    if (!sel) return;
    const currentYear = new Date().getFullYear() + 543;
    for (let y = currentYear; y >= currentYear - 10; y--) {
        sel.add(new Option(y, y));
    }
}


/* ====================== NAVIGATION ====================== */
function showSection(name, btn) {
    // ถ้ายังไม่ login → เตือนและไม่ให้ใช้งาน
    if (!isLoggedIn) {
        Swal.fire({
            icon: 'warning',
            title: 'กรุณาเข้าสู่ระบบ',
            text: 'คุณต้องเข้าสู่ระบบก่อนจึงจะใช้งานส่วนนี้ได้',
            timer: 2000,
            showConfirmButton: false
        });
        return;
    }

    // ซ่อนทุก section
    document.querySelectorAll('.wb-section').forEach(s => s.classList.add('d-none'));
    const target = document.getElementById(name + 'Section');
    if (target) target.classList.remove('d-none');

    // อัปเดต active ปุ่ม
    document.querySelectorAll('.wb-nav-btn').forEach(b => b.classList.remove('active'));
    if (btn) {
        btn.classList.add('active');
    } else {
        // หาปุ่มจาก onclick ที่ตรงกับ name
        const navBtn = document.querySelector('#navButtons button[onclick*="' + name + '"]');
        if (navBtn) navBtn.classList.add('active');
    }

    // โหลดข้อมูลเมื่อเข้า section ที่ต้องการ
    if (name === 'all') loadAllData();
    else if (name === 'search') loadAllData();
}

/**
 * protectedAction — wrapper สำหรับ action ที่ต้อง login ก่อน
 * ใช้กับปุ่มบันทึก, ค้นหา, export ฯลฯ
 * @param {Function} actionFn - ฟังก์ชันที่จะรัน
 */
function protectedAction(actionFn) {
    if (!isLoggedIn) {
        Swal.fire({
            icon: 'warning',
            title: 'กรุณาเข้าสู่ระบบ',
            text: 'คุณต้องเข้าสู่ระบบก่อนใช้งาน',
            timer: 2000,
            showConfirmButton: false
        });
        return;
    }
    actionFn();
}


/* ====================== FORM: CREATE ====================== */
async function handleRecordSubmit(e) {
    e.preventDefault();
    if (!isLoggedIn) {
        Swal.fire({ icon: 'warning', title: 'กรุณาเข้าสู่ระบบ', text: 'คุณต้องเข้าสู่ระบบก่อนใช้งาน' });
        return;
    }
    showSubmitSpinner(true);

    try {
        const params = {
            timestamp: new Date().toLocaleString('th-TH', { timeZone: 'Asia/Bangkok' }),
            details: val('details'),
            requesterName: val('requesterName'),
            district: val('district'),
            subdistrict: val('subdistrict'),
            village: val('village'),
            phone: val('phone'),
            wbs: val('wbs'),
            responsible: val('responsible'),
            budget: val('budget'),
            budgetAmount: val('budgetAmount'),
            status: val('status')
        };

        // ไฟล์แนบ
        const fileInput = document.getElementById('fileUpload');
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            params.fileName = file.name;
            params.fileType = file.type;
            params.fileData = await fileToBase64(file);
        }

        const result = await callApi('create', params, 'POST');
        if (result.success) {
            Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', text: 'ข้อมูลได้ถูกบันทึกเรียบร้อย', timer: 1800, showConfirmButton: false });
            resetForm();
        } else {
            throw new Error(result.error || 'เกิดข้อผิดพลาดในการบันทึก');
        }
    } catch (error) {
        console.error('Submit error:', error);
        Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: error.message });
    }
    showSubmitSpinner(false);
}

function val(id) {
    const el = document.getElementById(id);
    return el ? el.value : '';
}

function showSubmitSpinner(show) {
    const txt = document.getElementById('submitBtnText');
    const sp = document.getElementById('submitSpinner');
    if (show) { txt.classList.add('d-none'); sp.classList.remove('d-none'); }
    else { txt.classList.remove('d-none'); sp.classList.add('d-none'); }
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
    });
}

function resetForm() {
    document.getElementById('recordForm').reset();
}


/* ====================== FORM: UPDATE (EDIT) ====================== */
function openEditModal(index) {
    const row = allData[index];
    if (!row) return;
    document.getElementById('editRowIndex').value = index;
    const sel = document.getElementById('editStatus');
    sel.innerHTML = '';
    (configData.statusOptions || []).forEach(s => {
        const opt = new Option(s, s);
        if (s === row[10]) opt.selected = true;
        sel.add(opt);
    });
    document.getElementById('editModal').classList.remove('d-none');
}

async function handleEditSubmit(e) {
    e.preventDefault();
    const index = parseInt(document.getElementById('editRowIndex').value, 10);

    Swal.fire({
        title: 'กำลังบันทึก...', allowOutsideClick: false, allowEscapeKey: false,
        showConfirmButton: false, didOpen: () => Swal.showLoading()
    });

    try {
        const params = {
            rowIndex: index + 2, // +1 header, +1 base 1
            status: val('editStatus')
        };
        const fileInput = document.getElementById('editFileUpload');
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            params.fileName = file.name;
            params.fileType = file.type;
            params.fileData = await fileToBase64(file);
            params.responsible = allData[index][7];
        }
        const result = await callApi('update', params, 'POST');
        if (result.success) {
            Swal.fire({ icon: 'success', title: 'อัปเดตสำเร็จ', timer: 1500, showConfirmButton: false });
            closeEditModal();
            loadAllData();
        } else {
            throw new Error(result.error || 'อัปเดตไม่สำเร็จ');
        }
    } catch (error) {
        console.error('Update error:', error);
        Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: error.message });
    }
}

function closeEditModal() {
    document.getElementById('editModal').classList.add('d-none');
}


/* ====================== DATA: LOAD ALL ====================== */
async function loadAllData() {
    try {
        const result = await callApi('read');
        if (result && result.success) {
            allData = result.data || [];
            currentPage = 1;
            displayStatusCards();
            displayAllData();
        } else {
            console.error('loadAllData error:', result && result.error);
        }
    } catch (e) {
        console.error('loadAllData failed:', e);
    }
}

function displayStatusCards() {
    const container = document.getElementById('statusCards');
    const counts = {};
    let total = allData.length;
    allData.forEach(r => { const s = r[10]; counts[s] = (counts[s] || 0) + 1; });

    const cards = [
        { label: 'ข้อมูลทั้งหมด', num: total, sub: 'รายการในระบบ', cls: 'wb-stat-total' },
        { label: 'รอดำเนินการ', num: counts['รอดำเนินการ'] || 0, cls: 'wb-stat-pending' },
        { label: 'กำลังดำเนินการ', num: counts['กำลังดำเนินการ'] || 0, cls: 'wb-stat-progress' },
        { label: 'เสร็จสิ้น', num: counts['เสร็จสิ้น'] || 0, cls: 'wb-stat-done' },
        { label: 'ยกเลิก', num: counts['ยกเลิก'] || 0, cls: 'wb-stat-cancel' }
    ];

    container.innerHTML = cards.map((c, i) => {
        const pct = total > 0 ? ((c.num / total) * 100).toFixed(1) : 0;
        const colSpan = i === 0 ? 'col-12 col-md-12' : 'col-6 col-md-3';
        return '<div class="' + colSpan + '">' +
            '<div class="wb-stat-card ' + c.cls + '">' +
            '<div class="wb-stat-num">' + c.num + '</div>' +
            '<div class="wb-stat-label">' + c.label + '</div>' +
            (i > 0 ? '<div class="wb-stat-sub">(' + pct + '%)</div>' : '<div class="wb-stat-sub">' + (c.sub || '') + '</div>') +
            '</div></div>';
    }).join('');
}

function displayAllData() {
    const tbody = document.getElementById('allDataTableBody');
    const mobileList = document.getElementById('allDataMobileList');
    tbody.innerHTML = '';
    mobileList.innerHTML = '';

    if (allData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted py-4">ไม่มีข้อมูล</td></tr>';
        mobileList.innerHTML = '<div class="text-center text-muted py-4">ไม่มีข้อมูล</div>';
        document.getElementById('paginationContainer').innerHTML = '';
        return;
    }

    const totalPages = Math.max(1, Math.ceil(allData.length / ITEMS_PER_PAGE));
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * ITEMS_PER_PAGE;
    const pageData = allData.slice(start, start + ITEMS_PER_PAGE);

    pageData.forEach((row, i) => {
        const originalIndex = allData.indexOf(row);
        // Desktop row
        tbody.appendChild(createDesktopRow(row, start + i, originalIndex));
        // Mobile card
        mobileList.appendChild(createMobileCard(row, start + i, originalIndex));
    });

    renderPagination('paginationContainer', currentPage, totalPages, allData.length, changePage);
}


function createDesktopRow(row, index, originalIndex) {
    const tr = document.createElement('tr');
    const status = row[10] || 'ไม่ระบุ';
    const canEdit = status !== 'ยกเลิก' && status !== 'เสร็จสิ้น';
    let dateStr = formatDateShort(row[0]);
    let fileCell = buildFileCell(row[11]);

    tr.innerHTML =
        '<td>' + (index + 1) + '</td>' +
        '<td>' + dateStr + '</td>' +
        '<td class="wb-cell-ellipsis" title="' + escapeAttr(row[1] || '') + '">' + escapeHtml(row[1] || '-') + '</td>' +
        '<td>' + escapeHtml(row[2] || '-') + '</td>' +
        '<td>' + escapeHtml(row[3] || '-') + '</td>' +
        '<td>' + escapeHtml(row[7] || '-') + '</td>' +
        '<td>' + escapeHtml(row[8] || '-') + '</td>' +
        '<td>' + statusBadge(status) + '</td>' +
        '<td class="text-center">' + fileCell + '</td>' +
        '<td class="text-nowrap">' +
            '<button onclick="viewRecord(' + originalIndex + ')" class="btn btn-sm btn-link text-decoration-none p-0 me-2" title="ดู"><i class="fas fa-eye"></i></button>' +
            (canEdit ? '<button onclick="openEditModal(' + originalIndex + ')" class="btn btn-sm btn-link text-decoration-none p-0" title="แก้ไข"><i class="fas fa-edit"></i></button>' : '') +
        '</td>';
    return tr;
}

function createMobileCard(row, index, originalIndex) {
    const div = document.createElement('div');
    div.className = 'wb-mobile-card';
    const status = row[10] || 'ไม่ระบุ';
    const canEdit = status !== 'ยกเลิก' && status !== 'เสร็จสิ้น';
    div.innerHTML =
        '<div class="wb-mobile-card-row"><span class="wb-mobile-card-label">ลำดับ</span><span class="wb-mobile-card-value">' + (index + 1) + '</span></div>' +
        '<div class="wb-mobile-card-row"><span class="wb-mobile-card-label">วันที่</span><span class="wb-mobile-card-value">' + formatDateShort(row[0]) + '</span></div>' +
        '<div class="wb-mobile-card-row"><span class="wb-mobile-card-label">รายละเอียด</span><span class="wb-mobile-card-value">' + escapeHtml((row[1] || '-').substring(0, 60)) + '</span></div>' +
        '<div class="wb-mobile-card-row"><span class="wb-mobile-card-label">ผู้ขอ</span><span class="wb-mobile-card-value">' + escapeHtml(row[2] || '-') + '</span></div>' +
        '<div class="wb-mobile-card-row"><span class="wb-mobile-card-label">อำเภอ</span><span class="wb-mobile-card-value">' + escapeHtml(row[3] || '-') + '</span></div>' +
        '<div class="wb-mobile-card-row"><span class="wb-mobile-card-label">ผู้รับผิดชอบ</span><span class="wb-mobile-card-value">' + escapeHtml(row[7] || '-') + '</span></div>' +
        '<div class="wb-mobile-card-row"><span class="wb-mobile-card-label">สถานะ</span><span class="wb-mobile-card-value">' + statusBadge(status) + '</span></div>' +
        '<div class="d-flex gap-2 mt-2">' +
            '<button onclick="viewRecord(' + originalIndex + ')" class="btn btn-sm btn-outline-secondary flex-fill"><i class="fas fa-eye me-1"></i>ดู</button>' +
            (canEdit ? '<button onclick="openEditModal(' + originalIndex + ')" class="btn btn-sm wb-btn-primary flex-fill"><i class="fas fa-edit me-1"></i>แก้ไข</button>' : '') +
        '</div>';
    return div;
}


/* ====================== PAGINATION ====================== */
function renderPagination(containerId, current, totalPages, totalItems, onChangeFn) {
    const container = document.getElementById(containerId);
    if (totalPages <= 1) { container.innerHTML = '<div class="wb-pagination-info">ทั้งหมด ' + totalItems + ' รายการ</div>'; return; }

    const maxVisible = 5;
    let startPage = Math.max(1, current - Math.floor(maxVisible / 2));
    let endPage = Math.min(totalPages, startPage + maxVisible - 1);
    if (endPage - startPage + 1 < maxVisible) startPage = Math.max(1, endPage - maxVisible + 1);

    let html = '<div class="wb-pagination">';
    html += '<button onclick="' + onChangeFn.name + '(' + (current - 1) + ')" ' + (current === 1 ? 'disabled' : '') + '><i class="fas fa-chevron-left"></i></button>';
    if (startPage > 1) { html += '<button onclick="' + onChangeFn.name + '(1)">1</button>'; if (startPage > 2) html += '<span>...</span>'; }
    for (let i = startPage; i <= endPage; i++) {
        html += '<button onclick="' + onChangeFn.name + '(' + i + ')" class="' + (i === current ? 'active' : '') + '">' + i + '</button>';
    }
    if (endPage < totalPages) { if (endPage < totalPages - 1) html += '<span>...</span>'; html += '<button onclick="' + onChangeFn.name + '(' + totalPages + ')">' + totalPages + '</button>'; }
    html += '<button onclick="' + onChangeFn.name + '(' + (current + 1) + ')" ' + (current === totalPages ? 'disabled' : '') + '><i class="fas fa-chevron-right"></i></button>';

    const startItem = (current - 1) * ITEMS_PER_PAGE + 1;
    const endItem = Math.min(current * ITEMS_PER_PAGE, totalItems);
    html += '<span class="wb-pagination-info">แสดง ' + startItem + '-' + endItem + ' จาก ' + totalItems + '</span>';
    html += '</div>';
    container.innerHTML = html;
}

/* ====================== SORT ====================== */
function sortTable(colIndex) {
    const dir = sortDirection[colIndex] === 'asc' ? 'desc' : 'asc';
    sortDirection[colIndex] = dir;
    sortArray(allData, colIndex, dir);
    displayAllData();
    updateSortIcons('#allDataTable th', colIndex, dir, { 0: 2, 1: 3, 2: 4, 3: 5, 7: 6, 8: 7, 10: 8 });
}

function sortArray(arr, colIndex, dir) {
    arr.sort((a, b) => {
        let av = a[colIndex] || '';
        let bv = b[colIndex] || '';
        if (colIndex === 0) { av = new Date(av); bv = new Date(bv); }
        if (av < bv) return dir === 'asc' ? -1 : 1;
        if (av > bv) return dir === 'asc' ? 1 : -1;
        return 0;
    });
}

function updateSortIcons(selector, colIndex, dir, positions) {
    document.querySelectorAll(selector + ' i.fas').forEach(i => i.className = 'fas fa-sort');
    const pos = positions[colIndex];
    if (pos) {
        const th = document.querySelectorAll(selector)[pos - 1];
        const icon = th && th.querySelector('i.fas');
        if (icon) icon.className = 'fas fa-sort-' + (dir === 'asc' ? 'up' : 'down');
    }
}


/* ====================== SEARCH ====================== */
function searchData() {
    const text = document.getElementById('searchText').value.toLowerCase().trim();
    const resp = document.getElementById('searchResponsible').value;
    const status = document.getElementById('searchStatus').value;

    searchResultsData = allData.filter(row => {
        const matchText = !text ||
            (row[1] && String(row[1]).toLowerCase().includes(text)) ||
            (row[2] && String(row[2]).toLowerCase().includes(text));
        const matchResp = !resp || row[7] === resp;
        const matchStatus = !status || row[10] === status;
        return matchText && matchResp && matchStatus;
    });

    searchCurrentPage = 1;
    displaySearchResults();
    document.getElementById('exportSearchBtn').classList.toggle('d-none', searchResultsData.length === 0);
}

function renderSearchPagination(totalPages) {
    // ใช้ container เดิม ค้นหา โดย append
    const container = document.getElementById('searchResults');
    let pagiDiv = document.getElementById('searchPagination');
    if (!pagiDiv) {
        pagiDiv = document.createElement('div');
        pagiDiv.id = 'searchPagination';
        container.appendChild(pagiDiv);
    }
    if (totalPages <= 1) { pagiDiv.innerHTML = ''; return; }
    pagiDiv.innerHTML = buildPaginationHTML(searchCurrentPage, totalPages, searchResultsData.length, 'changeSearchPage');
}

function buildPaginationHTML(current, totalPages, totalItems, fnName) {
    const maxVisible = 5;
    let startPage = Math.max(1, current - Math.floor(maxVisible / 2));
    let endPage = Math.min(totalPages, startPage + maxVisible - 1);
    if (endPage - startPage + 1 < maxVisible) startPage = Math.max(1, endPage - maxVisible + 1);

    let html = '<div class="wb-pagination">';
    html += '<button onclick="' + fnName + '(' + (current - 1) + ')" ' + (current === 1 ? 'disabled' : '') + '><i class="fas fa-chevron-left"></i></button>';
    if (startPage > 1) { html += '<button onclick="' + fnName + '(1)">1</button>'; if (startPage > 2) html += '<span>...</span>'; }
    for (let i = startPage; i <= endPage; i++) {
        html += '<button onclick="' + fnName + '(' + i + ')" class="' + (i === current ? 'active' : '') + '">' + i + '</button>';
    }
    if (endPage < totalPages) { if (endPage < totalPages - 1) html += '<span>...</span>'; html += '<button onclick="' + fnName + '(' + totalPages + ')">' + totalPages + '</button>'; }
    html += '<button onclick="' + fnName + '(' + (current + 1) + ')" ' + (current === totalPages ? 'disabled' : '') + '><i class="fas fa-chevron-right"></i></button>';
    const startItem = (current - 1) * ITEMS_PER_PAGE + 1;
    const endItem = Math.min(current * ITEMS_PER_PAGE, totalItems);
    html += '<span class="wb-pagination-info">' + startItem + '-' + endItem + ' / ' + totalItems + '</span></div>';
    return html;
}

function changeSearchPage(page) {
    const totalPages = Math.ceil(searchResultsData.length / ITEMS_PER_PAGE);

/* ====================== SUMMARY ====================== */
function generateSummary() {
    const type = val('summaryType');
    const year = val('summaryYear');
    let filtered = allData;

    if (year) {
        filtered = allData.filter(row => {
            if (!row[0]) return false;
            const parsed = parseYearFromCell(row[0]);
            return parsed && parsed.toString() === year;
        });
    }

    const summary = {};
    filtered.forEach(row => {
        const key = type === 'responsible' ? (row[7] || 'ไม่ระบุ') : (row[3] || 'ไม่ระบุ');
        const st = row[10] || 'ไม่ระบุ';
        if (!summary[key]) summary[key] = { total: 0, statuses: {} };
        summary[key].total++;
        summary[key].statuses[st] = (summary[key].statuses[st] || 0) + 1;
    });

    displaySummaryResults(summary, filtered.length, type === 'responsible' ? 'ผู้รับผิดชอบ' : 'อำเภอ');
}

function displaySummaryResults(summary, total, typeLabel) {
    // Cards
    const cards = document.getElementById('summaryCards');
    const overall = {};
    Object.values(summary).forEach(d => Object.entries(d.statuses).forEach(([s, c]) => overall[s] = (overall[s] || 0) + c));
    const order = ['รอดำเนินการ', 'กำลังดำเนินการ', 'เสร็จสิ้น', 'ยกเลิก'];
    cards.innerHTML = order.map(s => {
        const c = overall[s] || 0;
        const pct = total > 0 ? ((c / total) * 100).toFixed(1) : 0;
        return '<div class="col-6 col-md-3"><div class="wb-stat-card wb-stat-progress"><div class="wb-stat-num">' + c + '</div><div class="wb-stat-label">' + s + '</div><div class="wb-stat-sub">(' + pct + '%)</div></div></div>';
    }).join('');

    // Chart
    renderSummaryChart(summary, typeLabel);
    // Table
    renderSummaryTable(summary, total, typeLabel);
}

function renderSummaryChart(summary, typeLabel) {
    const ctx = document.getElementById('summaryChart').getContext('2d');
    if (summaryChartInstance) summaryChartInstance.destroy();

    const labels = Object.keys(summary);
    const order = ['รอดำเนินการ', 'กำลังดำเนินการ', 'เสร็จสิ้น', 'ยกเลิก'];
    const colors = {
        'รอดำเนินการ': 'rgba(245, 158, 11, 0.8)',
        'กำลังดำเนินการ': 'rgba(59, 130, 246, 0.8)',
        'เสร็จสิ้น': 'rgba(34, 197, 94, 0.8)',
        'ยกเลิก': 'rgba(239, 68, 68, 0.8)'
    };
    const datasets = order.map(s => ({
        label: s,
        data: labels.map(l => summary[l].statuses[s] || 0),
        backgroundColor: colors[s]
    }));

    summaryChartInstance = new Chart(ctx, {
        type: 'bar',
        data: { labels: labels, datasets: datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } } },
            plugins: { legend: { position: 'top' } }
        }
    });
}

function renderSummaryTable(summary, total, typeLabel) {
    const order = ['รอดำเนินการ', 'กำลังดำเนินการ', 'เสร็จสิ้น', 'ยกเลิก'];
    let html = '<div class="table-responsive"><table class="table table-sm table-bordered"><thead class="table-light"><tr>';
    html += '<th>ลำดับ</th><th>' + typeLabel + '</th><th>รวม</th>';
    order.forEach(s => html += '<th>' + s + '</th>');
    html += '</tr></thead><tbody>';

    Object.entries(summary).forEach(([key, d], i) => {
        html += '<tr><td>' + (i + 1) + '</td><td>' + escapeHtml(key) + '</td><td><strong>' + d.total + '</strong></td>';
        order.forEach(s => {
            const c = d.statuses[s] || 0;
            html += '<td>' + c + '</td>';
        });
        html += '</tr>';
    });
    html += '</tbody></table></div>';
    document.getElementById('summaryTableContent').innerHTML = html;
}

function exportSummaryData() {

        summary[key]++;
    });

function downloadCSV(content, filename) {
    const blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

async function loadExternalLinks() {
    const container = document.getElementById('externalLinksContainer');
    container.innerHTML = '';
    try {
        const result = await callApi('getExternalLinks');
        let links = (result && result.success && result.data) ? result.data : [];
        if (!links.length) links = [{ url: 'https://youtu.be/bPUxCbQeq8w', title: 'PEA SmartPlus', description: 'วิดีโอแนะนำ PEA Smart Plus' }];

        links.forEach(link => {

        });
    } catch (e) {

        // ซ่อน section อื่นๆ หากโหลดไม่ได้
        const othersNav = document.getElementById('othersNavBtn');
        if (othersNav) othersNav.classList.add('d-none');
    }
}

function buildLinkCard(link) {
    const col = document.createElement('div');
    let colorClass = 'bg-primary', icon = 'fas fa-external-link-alt';
    const url = link.url || '';
    if (url.includes('youtu')) { colorClass = 'bg-danger'; icon = 'fab fa-youtube'; }
    else if (url.includes('facebook')) { colorClass = 'bg-primary'; icon = 'fab fa-facebook'; }
    else if (url.includes('line.me')) { colorClass = 'bg-success'; icon = 'fab fa-line'; }
    else if (url.includes('google')) { colorClass = 'bg-warning'; icon = 'fab fa-google'; }

    const isYt = url.includes('youtu');
    if (isYt) col.className = 'col-12';

    let inner = '<div class="wb-link-card ' + colorClass + '">';
    if (isYt) {
        const embed = youtubeEmbedUrl(url);
        inner += '<div class="text-center mb-3"><i class="' + icon + ' wb-link-icon"></i><div class="wb-link-title">' + escapeHtml(link.title) + '</div><div class="wb-link-desc">' + escapeHtml(link.description || '') + '</div></div>';
        inner += '<iframe class="wb-youtube-frame" src="' + embed + '" frameborder="0" allowfullscreen loading="lazy"></iframe>';
        inner += '<div class="text-center mt-3"><button onclick="openLinkInNewTab(\'' + escapeAttr(url) + '\')" class="btn btn-light btn-sm"><i class="fas fa-external-link-alt me-1"></i>เปิด YouTube</button></div>';
    } else {
        inner += '<div class="text-center"><i class="' + icon + ' wb-link-icon"></i><div class="wb-link-title">' + escapeHtml(link.title) + '</div><div class="wb-link-desc">' + escapeHtml(link.description || '') + '</div>';
        inner += '<div class="d-flex gap-2 justify-content-center mt-3"><button onclick="openLinkInModal(\'' + escapeAttr(url) + '\',\'' + escapeAttr(link.title) + '\')" class="btn btn-light btn-sm"><i class="fas fa-window-maximize me-1"></i>หน้าต่าง</button>';
        inner += '<button onclick="openLinkInNewTab(\'' + escapeAttr(url) + '\')" class="btn btn-light btn-sm"><i class="fas fa-external-link-alt me-1"></i>แท็บใหม่</button></div></div>';
    }
    inner += '</div>';
    col.innerHTML = inner;
    return col;
}

function youtubeEmbedUrl(url) {
    try {
        if (url.includes('watch?v=')) return 'https://www.youtube.com/embed/' + url.split('v=')[1].split('&')[0];
        if (url.includes('shorts/')) return 'https://www.youtube.com/embed/' + url.split('shorts/')[1].split('?')[0];
        if (url.includes('youtu.be/')) return 'https://www.youtube.com/embed/' + url.split('youtu.be/')[1].split('?')[0];
    } catch (e) {}
    return url;
}


/* ====================== LINK MODAL ====================== */
function openLinkInModal(url, title) {
    document.getElementById('linkModalTitle').textContent = title || 'ลิ้งค์ภายนอก';
    const frame = document.getElementById('linkFrame');
    frame.src = '';
    setTimeout(() => { frame.src = youtubeEmbedUrl(url); }, 100);
    document.getElementById('linkModal').classList.remove('d-none');
}

function openLinkInNewTab(url) {
    window.open(url, '_blank');
}

function closeLinkModal() {
    document.getElementById('linkFrame').src = '';
    document.getElementById('linkModal').classList.add('d-none');
    if (document.fullscreenElement) document.exitFullscreen();
}

function toggleFullscreen() {
    const modal = document.getElementById('linkModal');
    if (!document.fullscreenElement) modal.requestFullscreen();
    else document.exitFullscreen();
}


/* ====================== HELPERS ====================== */
function statusBadge(status) {
    const map = {
        'รอดำเนินการ': 'wb-badge-pending',
        'กำลังดำเนินการ': 'wb-badge-progress',
        'เสร็จสิ้น': 'wb-badge-done',
        'ยกเลิก': 'wb-badge-cancel'
    };
    const cls = map[status] || 'wb-badge-default';
    return '<span class="wb-badge ' + cls + '">' + escapeHtml(status) + '</span>';
}

function buildFileCell(url) {
    if (!url) return '<span class="text-muted">-</span>';
    const isImg = url.includes('googleusercontent') || /\.(jpg|jpeg|png|gif|webp)$/i.test(url);
    if (isImg) return '<i class="fas fa-file-image text-success" style="cursor:pointer" onclick="showImageModal(\'' + url + '\')"></i>';
    return '<a href="' + url + '" target="_blank" class="text-success"><i class="fas fa-file"></i></a>';
}

function formatDateShort(val) {
    if (!val) return '-';
    const s = String(val);
    if (s.includes('T')) return s.split('T')[0];
    return s.split(' ')[0] || s;
}

function parseYearFromCell(cellVal) {
    if (!cellVal) return null;
    const s = String(cellVal);
    let year = null;
    if (s.includes('/')) {
        const parts = s.split('/');
        if (parts.length >= 3) year = parseInt(parts[2], 10);
    } else if (s.includes('-')) {
        year = parseInt(s.split('-')[0], 10);
    } else {
        const d = new Date(s);
        if (!isNaN(d.getTime())) year = d.getFullYear();
    }
    if (year && year < 2500) year += 543;
    return year;
}

function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function escapeAttr(str) {
    if (str == null) return '';
    return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
